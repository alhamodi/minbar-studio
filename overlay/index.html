<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commercial OBS Stream Pack</title>
    <!-- We load fonts dynamically via JS, but preload common ones here -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cinzel:wght@400;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="/overlay/overlay.css">
    <!-- Component-specific CSS will be injected by JS -->
</head>
<body>
    
    <!-- Dynamic Scale Wrapper for Phase 9 (Responsive Layout) -->
    <div id="layout-wrapper">
        
        <!-- Background Layer -->
        <div id="layer-background"></div>

        <!-- Scene Layer -->
        <div id="layer-scenes"></div>

        <!-- Widget Layer -->
        <div id="layer-widgets"></div>
        
    </div>

    <!-- Application Entry Point -->
    <script type="module" src="/overlay/main.js"></script>
</body>
</html>
